<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 32 802 170" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6.5,3 L0,6 Z" fill="#333333"/>
    </marker>
    <marker id="ahs" markerWidth="7" markerHeight="7" refX="5.5" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L5.5,2.5 L0,5 Z" fill="#6b7280"/>
    </marker>
    <marker id="ahl" markerWidth="7" markerHeight="7" refX="5.5" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L5.5,2.5 L0,5 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <style>
    .comp  { font-size: 10px; font-weight: 700; fill: #111111; }
    .elab  { font-size: 8px; fill: #555555; }
    .res   { font-size: 7.5px; font-weight: 700; fill: #333333; }
    .fname { font-size: 8px; font-weight: 700; }
    .ohdr  { font-size: 8.5px; font-weight: 700; fill: #111111; }
    .nl    { font-size: 6.5px; font-weight: 700; }
    .tup   { font-size: 7px; fill: #374151; }
  </style>

  <!-- ================= INPUT: two file types ================= -->
  <g>
    <!-- .ipynb notebook -->
    <path d="M12,74 L40,74 L46,80 L46,112 L12,112 Z" fill="#ffffff" stroke="#9ca3af"/>
    <path d="M40,74 L40,80 L46,80" fill="none" stroke="#9ca3af"/>
    <rect x="16" y="84" width="24" height="6" rx="1" fill="#f1f5f9" stroke="#cbd5e1"/>
    <rect x="16" y="84" width="3" height="6" fill="#94a3b8"/>
    <rect x="16" y="94" width="24" height="7" rx="1" fill="#f8fafc" stroke="#e5e7eb"/>
    <rect x="16" y="94" width="3" height="7" fill="#94a3b8"/>
    <text x="29" y="124" text-anchor="middle" class="fname" fill="#374151">.ipynb</text>
    <!-- .py script -->
    <path d="M54,74 L82,74 L88,80 L88,112 L54,112 Z" fill="#ffffff" stroke="#9ca3af"/>
    <path d="M82,74 L82,80 L88,80" fill="none" stroke="#9ca3af"/>
    <rect x="58" y="84"  width="8"  height="2.6" rx="1" fill="#64748b"/>
    <rect x="68" y="84"  width="14" height="2.6" rx="1" fill="#cbd5e1"/>
    <rect x="62" y="90"  width="18" height="2.6" rx="1" fill="#cbd5e1"/>
    <rect x="62" y="96"  width="12" height="2.6" rx="1" fill="#94a3b8"/>
    <rect x="58" y="102" width="9"  height="2.6" rx="1" fill="#cbd5e1"/>
    <text x="71" y="124" text-anchor="middle" class="fname" fill="#374151">.py</text>
  </g>

  <!-- ================= SYSTEM BOUNDARY (SystemX) ================= -->
  <rect x="104" y="44" width="540" height="156" rx="4" fill="#fafafa" stroke="#333333"/>
  <!-- chip straddling the top boundary line -->
  <rect x="336" y="36" width="76" height="16" rx="8" fill="#333333"/>
  <text x="374" y="47.5" text-anchor="middle" font-size="9.5" font-weight="700" letter-spacing="1.2" fill="#ffffff">SystemX</text>

  <!-- ================= COMPONENT BOXES ================= -->
  <g fill="#ffffff" stroke="#333333">
    <rect x="118" y="60" width="92" height="68" rx="3"/>
    <rect x="258" y="60" width="92" height="68" rx="3"/>
    <rect x="398" y="60" width="92" height="68" rx="3"/>
    <rect x="538" y="60" width="92" height="68" rx="3"/>
  </g>

  <!-- Code Parser icon: CDF graph -->
  <g transform="translate(146,66)">
    <g fill="#e2e8f0" stroke="#475569" stroke-width="1"><circle cx="4" cy="5" r="5"/><circle cx="4" cy="21" r="5"/><rect x="24" y="8" width="11" height="11" rx="2"/></g>
    <g fill="none" stroke="#94a3b8" stroke-width="1"><path d="M9,5 L23,11" marker-end="url(#ahl)"/><path d="M9,21 L23,17" marker-end="url(#ahl)"/></g>
  </g>
  <!-- Labeling Engine icon: tag + class dots -->
  <g transform="translate(286,66)">
    <path d="M2,6 L14,1 L26,6 L26,18 L14,23 L2,18 Z" fill="#e2e8f0" stroke="#475569" stroke-width="1"/>
    <circle cx="14" cy="12" r="2.2" fill="#475569"/>
    <circle cx="34" cy="4"  r="3.2" fill="#e2e8f0" stroke="#64748b"/>
    <circle cx="34" cy="13" r="3.2" fill="#cbd5e1" stroke="#64748b"/>
    <circle cx="34" cy="22" r="3.2" fill="#94a3b8" stroke="#64748b"/>
  </g>
  <!-- Graph Refiner icon: fixpoint loop -->
  <g transform="translate(429,66)" fill="none" stroke="#475569" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22,8 A11,11 0 1 0 23,17"/><path d="M22,2 L22,9 L15,9"/>
  </g>
  <!-- Serializer icon: braces -->
  <g transform="translate(571,66)" fill="none" stroke="#475569" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9,1 C4,1 6,11 1,11 C6,11 4,21 9,21"/><path d="M17,1 C22,1 20,11 25,11 C20,11 22,21 17,21"/>
  </g>

  <g text-anchor="middle">
    <text x="164" y="106" class="comp">Code</text>
    <text x="164" y="118" class="comp">Parser</text>
    <text x="304" y="106" class="comp">Labeling</text>
    <text x="304" y="118" class="comp">Engine</text>
    <text x="444" y="106" class="comp">Graph</text>
    <text x="444" y="118" class="comp">Refiner</text>
    <text x="584" y="106" class="comp">Lineage</text>
    <text x="584" y="118" class="comp">Serializer</text>
  </g>

  <!-- ================= RESOURCES with icons ================= -->
  <!-- feature sources feeding Labeling Engine -->
  <g>
    <rect x="258" y="136" width="92" height="56" rx="4" fill="#ffffff" stroke="#333333"/>
    <text x="304" y="148" text-anchor="middle" class="res" fill="#64748b">node features</text>
    <line x1="266" y1="152" x2="342" y2="152" stroke="#e5e7eb"/>
    <rect x="276" y="157" width="5.5" height="5.5" rx="1" fill="#e2e8f0" stroke="#64748b"/>
    <text x="287" y="162" class="res">FastText</text>
    <rect x="276" y="169" width="5.5" height="5.5" rx="1" fill="#e2e8f0" stroke="#64748b"/>
    <text x="287" y="174" class="res">Topology</text>
    <rect x="276" y="181" width="5.5" height="5.5" rx="1" fill="#e2e8f0" stroke="#64748b"/>
    <text x="287" y="186" class="res">AST</text>
  </g>
  <!-- rewrite rules feeding Graph Refiner -->
  <g>
    <rect x="398" y="148" width="92" height="32" rx="4" fill="#ffffff" stroke="#333333"/>
    <rect x="422" y="155" width="13" height="17" rx="1.5" fill="#ffffff" stroke="#475569"/>
    <g stroke="#64748b" stroke-width="0.9" fill="none" stroke-linecap="round"><path d="M424,159 l1.3,1.3 l2,-2.4"/><path d="M424,164 l1.3,1.3 l2,-2.4"/><path d="M424,169 l1.3,1.3 l2,-2.4"/></g>
    <g stroke="#cbd5e1" stroke-width="0.9"><line x1="429" y1="159" x2="433" y2="159"/><line x1="429" y1="164" x2="433" y2="164"/><line x1="429" y1="169" x2="433" y2="169"/></g>
    <text x="440" y="167" class="res">10 Rules</text>
  </g>

  <!-- ================= OUTPUT 1: Lineage DAG ================= -->
  <g>
    <text x="680" y="46" class="ohdr">Lineage DAG</text>
    <path d="M684,56 v9 a6,2.4 0 0 0 12,0 v-9" fill="#e2e8f0" stroke="#64748b"/>
    <ellipse cx="690" cy="56" rx="6" ry="2.4" fill="#f1f5f9" stroke="#64748b"/>
    <circle cx="720" cy="62" r="6.5" fill="#e2e8f0" stroke="#64748b"/>
    <path d="M742,56 v9 a6,2.4 0 0 0 12,0 v-9" fill="#e2e8f0" stroke="#64748b"/>
    <ellipse cx="748" cy="56" rx="6" ry="2.4" fill="#f1f5f9" stroke="#64748b"/>
    <rect x="770" y="55" width="14" height="14" rx="3" fill="#e2e8f0" stroke="#64748b"/>
    <g fill="none" stroke="#6b7280" stroke-width="1"><path d="M696,62 L712,62" marker-end="url(#ahs)"/><path d="M727,62 L740,62" marker-end="url(#ahs)"/><path d="M754,62 L768,62" marker-end="url(#ahs)"/></g>
    <g text-anchor="middle" class="nl">
      <text x="690" y="81" fill="#475569">data</text>
      <text x="720" y="81" fill="#475569">op</text>
      <text x="748" y="81" fill="#475569">data'</text>
      <text x="777" y="81" fill="#475569">model</text>
    </g>
  </g>

  <!-- ================= OUTPUT 2: Lineage Tuples ================= -->
  <g>
    <text x="680" y="102" class="ohdr">Lineage Tuples</text>
    <g>
      <rect x="682" y="109" width="8" height="8" rx="1.5" fill="#e2e8f0" stroke="#64748b"/>
      <text x="693" y="116" class="tup">Dataset</text>
      <path d="M724,113 L736,113" stroke="#6b7280" stroke-width="1" marker-end="url(#ahs)" fill="none"/>
      <rect x="739" y="109" width="8" height="8" rx="1.5" fill="#e2e8f0" stroke="#64748b"/>
      <text x="750" y="116" class="tup">Dataset</text>

      <rect x="682" y="123" width="8" height="8" rx="1.5" fill="#e2e8f0" stroke="#64748b"/>
      <text x="693" y="130" class="tup">Dataset</text>
      <path d="M724,127 L736,127" stroke="#6b7280" stroke-width="1" marker-end="url(#ahs)" fill="none"/>
      <rect x="739" y="123" width="8" height="8" rx="1.5" fill="#e2e8f0" stroke="#64748b"/>
      <text x="750" y="130" class="tup">Model</text>

      <rect x="682" y="137" width="8" height="8" rx="1.5" fill="#e2e8f0" stroke="#64748b"/>
      <text x="693" y="144" class="tup">Dataset</text>
      <path d="M724,141 L736,141" stroke="#6b7280" stroke-width="1" marker-end="url(#ahs)" fill="none"/>
      <rect x="739" y="137" width="8" height="8" rx="1.5" fill="none" stroke="#9ca3af" stroke-dasharray="2 1.5"/>
      <text x="750" y="144" class="tup" fill="#9ca3af">(empty)</text>
    </g>
  </g>

  <!-- ================= FLOW ARROWS + EDGE LABELS ================= -->
  <g stroke="#333333" stroke-width="1.2" fill="none">
    <path d="M90,94 L116,94"   marker-end="url(#ah)"/>
    <path d="M210,94 L256,94"  marker-end="url(#ah)"/>
    <path d="M350,94 L396,94"  marker-end="url(#ah)"/>
    <path d="M490,94 L536,94"  marker-end="url(#ah)"/>
    <!-- branch to outputs (fork placed outside the boundary, in clear space) -->
    <path d="M630,94 L660,94"/>
    <path d="M660,62 L660,126"/>
    <path d="M660,62 L680,62"   marker-end="url(#ah)"/>
    <path d="M660,126 L680,126" marker-end="url(#ah)"/>
    <!-- resource feeds -->
    <path d="M304,136 L304,129" marker-end="url(#ah)"/>
    <path d="M444,148 L444,129" marker-end="url(#ah)"/>
  </g>
  <g text-anchor="middle" class="elab">
    <text x="103" y="90">code</text>
    <text x="233" y="90">CDF-IR</text>
    <text x="373" y="90">labeled IR</text>
    <text x="513" y="90">refined</text>
  </g>
</svg>
